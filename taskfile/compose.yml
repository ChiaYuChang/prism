version: "3"

vars:
  EFFECTIVE_MODE:
    sh: "cat {{.MODE_FILE}} 2>/dev/null || echo {{.MODE}}"
  EFFECTIVE_PROFILES:
    sh: "cat {{.PROFILES_FILE}} 2>/dev/null || echo {{.COMPOSE_PROFILES}}"
  EFFECTIVE_PROJECT: "{{.NAME}}-{{.EFFECTIVE_MODE}}"
  EFFECTIVE_PROFILES_SLUG:
    sh: 'echo "{{.EFFECTIVE_PROFILES}}" | tr "," "_"'
  EFFECTIVE_COMPOSE_MERGED: '.{{.ENV}}-{{.EFFECTIVE_PROFILES_SLUG}}.docker-compose.merged.yaml'

env:
  COMPOSE_PROJECT_NAME: "{{.PROJECT}}"
  COMPOSE_PROFILES: "{{.COMPOSE_PROFILES}}"

tasks:
  bake:
    # Delegates to script/compose-bake.sh, which owns the -f file list,
    # enforces ENV in {test,prod}, gates ENV=prod behind PRISM_PROD_OK=1,
    # and writes the merged file with mode 0600. Per-(ENV,PROFILES) output
    # path means swapping profiles does not clobber an existing bake.
    desc: bake per-(ENV,PROFILES) merged compose file via script
    summary: |
      Renders the merged Docker Compose file for the selected ENV and
      COMPOSE_PROFILES. Secret values stay unresolved in the generated file so
      they are read at compose runtime instead of baked into plaintext output.
    cmds:
      - ENV={{.ENV}} PROFILES={{.COMPOSE_PROFILES}} ./script/compose-bake.sh

  bake:clean:
    desc: remove all per-(ENV,PROFILES) merged compose files
    summary: |
      Deletes generated .<env>-<profiles>.docker-compose.merged.yaml files.
      Use this when profile combinations have changed or stale bake artifacts
      should be removed from the working tree.
    cmds:
      - rm -f .*-*.docker-compose.merged.yaml

  up:
    desc: start all services (project = {NAME}-{MODE}; refuses if .task/mode exists)
    summary: |
      Starts the core infra stack plus any enabled profile services for the
      selected MODE. Records the active mode/profile in .task/ so later down
      and clean commands target the same Compose project.
    deps: [ bake ]
    preconditions:
      - sh: |
          if [ -f {{.MODE_FILE}} ]; then
            echo "stack '$(cat {{.MODE_FILE}})' is already up; run 'task compose:down' first" >&2
            exit 1
          fi
    env:
      COMPOSE_PROJECT_NAME: "{{.PROJECT}}"
      COMPOSE_PROFILES: "{{.COMPOSE_PROFILES}}"
    cmds:
      - mkdir -p {{.TASK_DIR}}
      - mkdir -p runtime/logs/{api-server,batch-detector,batch-publisher,scheduler-fast,scheduler-slow,discovery,collector,planner}
      - chmod 0777 runtime/logs runtime/logs/{api-server,batch-detector,batch-publisher,scheduler-fast,scheduler-slow,discovery,collector,planner}
      - docker compose -f {{.COMPOSE_MERGED}} up -d
      - "echo {{.MODE}} > {{.MODE_FILE}}"
      - "echo {{.COMPOSE_PROFILES}} > {{.PROFILES_FILE}}"
      - task: wait
        vars: { MODE: "{{.MODE}}", PROJECT: "{{.PROJECT}}" }

  wait:
    desc: wait for core services, plus observability services when obs profile is active
    summary: |
      Waits for healthy/running containers in the currently baked compose stack.
      Core services are always checked: postgres, nats, valkey, seaweedfs.
      When COMPOSE_PROFILES includes obs, also checks the Victoria stack:
      victoria-metrics, vmagent, victoria-logs, victoria-traces, otel-collector, grafana.
    deps: [ bake ]
    vars:
      TIMEOUT: "{{.TIMEOUT | default 30}}"
    env:
      COMPOSE_PROJECT_NAME: "{{.PROJECT}}"
      COMPOSE_PROFILES: "{{.COMPOSE_PROFILES}}"
    cmds:
      - |
        SERVICES=(postgres nats valkey seaweedfs)
        PROFILES=",{{.COMPOSE_PROFILES}},"
        if [[ "$PROFILES" == *",obs,"* ]]; then
          SERVICES+=(victoria-metrics vmagent victoria-logs victoria-traces otel-collector grafana)
        fi
        for svc in "${SERVICES[@]}"; do
          CID=$(docker compose -f {{.COMPOSE_MERGED}} ps -q $svc)
          if [ -n "$CID" ]; then
            bash ./script/wait_for_healthy.sh "$CID" {{.TIMEOUT}}
          else
            echo "Service $svc is not running (or not defined)."
            exit 1
          fi
        done

  down:
    desc: stop and remove all services (honors .task/mode if present)
    summary: |
      Stops and removes containers for the active stack while preserving named
      volumes. If .task/mode exists, it uses that recorded mode so teardown is
      safe even from a later shell session.
    vars:
      COMPOSE_MERGED: "{{.EFFECTIVE_COMPOSE_MERGED}}"
    env:
      COMPOSE_PROJECT_NAME: "{{.EFFECTIVE_PROJECT}}"
      COMPOSE_PROFILES: "{{.EFFECTIVE_PROFILES}}"
    cmds:
      - docker compose -f {{.COMPOSE_MERGED}} down
      - rm -f {{.MODE_FILE}}
      - rm -f {{.PROFILES_FILE}}

  clean:
    desc: stop and remove all services + volumes (honors .task/mode if present)
    summary: |
      Fully tears down the active stack, including named volumes and orphaned
      containers. This is the destructive cleanup path for resetting local or
      e2e infrastructure state.
    vars:
      COMPOSE_MERGED: "{{.EFFECTIVE_COMPOSE_MERGED}}"
    env:
      COMPOSE_PROJECT_NAME: "{{.EFFECTIVE_PROJECT}}"
      COMPOSE_PROFILES: "{{.EFFECTIVE_PROFILES}}"
    cmds:
      - docker compose -f {{.COMPOSE_MERGED}} down -v --remove-orphans
      - rm -f {{.MODE_FILE}}
      - rm -f {{.PROFILES_FILE}}

  logs:
    desc: list all service logs
    summary: |
      Follows logs for the currently baked stack using the active or requested
      Compose project name. Useful after compose:up when multiple service logs
      need to be inspected together.
    deps: [ bake ]
    env:
      COMPOSE_PROJECT_NAME: "{{.EFFECTIVE_PROJECT}}"
      COMPOSE_PROFILES: "{{.EFFECTIVE_PROFILES}}"
    cmds:
      - docker compose -f {{.COMPOSE_MERGED}} logs -f

  start:
    desc: start full containerized stack
    summary: |
      Starts the deployable local stack: core infra, enabled dev/observability
      profile services, database migrations, and containerized app services.
      Fixture replay services are intentionally excluded from this real-world
      collection path.
    cmds:
      - for: [start:up, start:migrate:up, start:worker, start:app]
        task: "{{.ITEM}}"

  start:up:
    internal: true
    cmds:
      - task: up
        vars:
          COMPOSE_PROFILES: "{{.COMPOSE_PROFILES}}"

  start:migrate:up:
    internal: true
    cmds:
      - task: :migrate:up

  start:worker:
    internal: true
    cmds:
      - task: worker
        vars:
          COMPOSE_PROFILES: "{{.COMPOSE_PROFILES}}"

  start:app:
    internal: true
    cmds:
      - task: app
        vars:
          COMPOSE_PROFILES: "{{.COMPOSE_PROFILES}},worker"

  migrate:up:
    internal: true
    cmds:
      - task: :migrate:up

  app:
    desc: build and start containerized app services (requires infra stack to be up)
    summary: |
      Bakes the app profile, builds container images for API and trigger
      services, and starts them alongside an already running infra stack. Worker
      containers are managed separately by compose:worker.
    deps:
      - task: bake
        vars:
          COMPOSE_PROFILES: '{{.APP_PROFILES}}'
    vars:
      BASE_PROFILES:
        sh: "cat {{.PROFILES_FILE}} 2>/dev/null || echo {{.COMPOSE_PROFILES}}"
      APP_PROFILES:
        sh: 'p="{{.BASE_PROFILES}}"; case ",$p," in *",app,"*) echo "$p" ;; *) echo "$p,app" ;; esac'
      PROFILES_SLUG:
        sh: 'echo "{{.APP_PROFILES}}" | tr "," "_"'
      COMPOSE_MERGED: '.{{.ENV}}-{{.PROFILES_SLUG}}.docker-compose.merged.yaml'
    preconditions:
      - sh: "test -f {{.MODE_FILE}}"
        msg: "infra stack is not up. Run 'task compose:up' first."
    env:
      COMPOSE_PROFILES: "{{.APP_PROFILES}}"
      NATS_AUTH_TOKEN:
        sh: "cat {{.NATS_AUTH_TOKEN_FILE}}"
      POSTGRES_APP_PASSWORD:
        sh: "cat {{.POSTGRES_APP_PASSWORD_FILE}}"
      VALKEY_APP_PASSWORD: "{{.VALKEY_APP_PASSWORD}}"
      POSTGRES_APP_USER: "{{.POSTGRES_APP_USER}}"
      POSTGRES_APP_DB: "{{.POSTGRES_APP_DB}}"
      VALKEY_APP_USER: "{{.VALKEY_APP_USER}}"
      WORKER_RUNTIME_IMAGE: "{{.WORKER_RUNTIME_IMAGE}}"
    cmds:
      - docker compose -f {{.COMPOSE_MERGED}} build batch-detector
        batch-publisher prism-api
      - docker compose -f {{.COMPOSE_MERGED}} up -d batch-detector
        batch-publisher prism-api
      - "echo {{.APP_PROFILES}} > {{.PROFILES_FILE}}"

  worker:
    desc: build and start containerized workers (requires infra stack to be up)
    summary: |
      Bakes the worker profile, builds container images for scheduler,
      discovery, and collector workers, and starts them alongside an already
      running infra stack. App/API services are managed separately by
      compose:app.
    deps:
      - task: bake
        vars:
          COMPOSE_PROFILES: '{{.WORKER_PROFILES}}'
    vars:
      BASE_PROFILES:
        sh: "cat {{.PROFILES_FILE}} 2>/dev/null || echo {{.COMPOSE_PROFILES}}"
      WORKER_PROFILES:
        sh: 'p="{{.BASE_PROFILES}}"; case ",$p," in *",worker,"*) echo "$p" ;; *) echo "$p,worker" ;; esac'
      PROFILES_SLUG:
        sh: 'echo "{{.WORKER_PROFILES}}" | tr "," "_"'
      COMPOSE_MERGED: '.{{.ENV}}-{{.PROFILES_SLUG}}.docker-compose.merged.yaml'
    preconditions:
      - sh: "test -f {{.MODE_FILE}}"
        msg: "infra stack is not up. Run 'task compose:up' first."
    env:
      COMPOSE_PROFILES: "{{.WORKER_PROFILES}}"
      NATS_AUTH_TOKEN:
        sh: "cat {{.NATS_AUTH_TOKEN_FILE}}"
      POSTGRES_APP_PASSWORD:
        sh: "cat {{.POSTGRES_APP_PASSWORD_FILE}}"
      VALKEY_APP_PASSWORD: "{{.VALKEY_APP_PASSWORD}}"
      POSTGRES_APP_USER: "{{.POSTGRES_APP_USER}}"
      POSTGRES_APP_DB: "{{.POSTGRES_APP_DB}}"
      VALKEY_APP_USER: "{{.VALKEY_APP_USER}}"
      WORKER_RUNTIME_IMAGE: "{{.WORKER_RUNTIME_IMAGE}}"
    cmds:
      - docker compose -f {{.COMPOSE_MERGED}} build scheduler-slow discovery
        collector
      - docker compose -f {{.COMPOSE_MERGED}} up -d scheduler-slow scheduler-fast
        discovery collector
      - "echo {{.WORKER_PROFILES}} > {{.PROFILES_FILE}}"

  app:down:
    desc: stop containerized app services (leaves infra and workers running)
    summary: |
      Stops and removes only the app-profile containers from the active project.
      Core infrastructure and worker containers remain running.
    deps:
      - task: bake
        vars:
          COMPOSE_PROFILES: '{{.APP_PROFILES}}'
    vars:
      BASE_PROFILES:
        sh: "cat {{.PROFILES_FILE}} 2>/dev/null || echo {{.COMPOSE_PROFILES}}"
      APP_PROFILES:
        sh: 'p="{{.BASE_PROFILES}}"; case ",$p," in *",app,"*) echo "$p" ;; *) echo "$p,app" ;; esac'
      PROFILES_SLUG:
        sh: 'echo "{{.APP_PROFILES}}" | tr "," "_"'
      COMPOSE_MERGED: '.{{.ENV}}-{{.PROFILES_SLUG}}.docker-compose.merged.yaml'
    env:
      COMPOSE_PROFILES: "{{.APP_PROFILES}}"
    cmds:
      - docker compose -f {{.COMPOSE_MERGED}} stop batch-detector batch-publisher prism-api
      - docker compose -f {{.COMPOSE_MERGED}} rm -f batch-detector batch-publisher prism-api

  app:logs:
    desc: tail logs from containerized app services
    summary: |
      Follows logs for app-profile services: batch detector, batch publisher,
      and the user-facing API server.
    deps:
      - task: bake
        vars:
          COMPOSE_PROFILES: '{{.APP_PROFILES}}'
    vars:
      BASE_PROFILES:
        sh: "cat {{.PROFILES_FILE}} 2>/dev/null || echo {{.COMPOSE_PROFILES}}"
      APP_PROFILES:
        sh: 'p="{{.BASE_PROFILES}}"; case ",$p," in *",app,"*) echo "$p" ;; *) echo "$p,app" ;; esac'
      PROFILES_SLUG:
        sh: 'echo "{{.APP_PROFILES}}" | tr "," "_"'
      COMPOSE_MERGED: '.{{.ENV}}-{{.PROFILES_SLUG}}.docker-compose.merged.yaml'
    env:
      COMPOSE_PROFILES: "{{.APP_PROFILES}}"
    cmds:
      - docker compose -f {{.COMPOSE_MERGED}} logs -f batch-detector
        batch-publisher prism-api

  fixture:
    desc: build and start containerized fixture server (replay/e2e only)
    summary: |
      Starts the fixture-server service behind the fixture profile. This is for
      deterministic replay/e2e flows only and is intentionally excluded from the
      normal real-world collection stack.
    deps:
      - task: bake
        vars:
          COMPOSE_PROFILES: '{{.FIXTURE_PROFILES}}'
    vars:
      BASE_PROFILES:
        sh: "cat {{.PROFILES_FILE}} 2>/dev/null || echo {{.COMPOSE_PROFILES}}"
      FIXTURE_PROFILES:
        sh: 'p="{{.BASE_PROFILES}}"; case ",$p," in *",fixture,"*) echo "$p" ;; *) echo "$p,fixture" ;; esac'
      PROFILES_SLUG:
        sh: 'echo "{{.FIXTURE_PROFILES}}" | tr "," "_"'
      COMPOSE_MERGED: '.{{.ENV}}-{{.PROFILES_SLUG}}.docker-compose.merged.yaml'
    preconditions:
      - sh: "test -f {{.MODE_FILE}}"
        msg: "infra stack is not up. Run 'task compose:up' first."
    env:
      COMPOSE_PROFILES: "{{.FIXTURE_PROFILES}}"
      WORKER_RUNTIME_IMAGE: "{{.WORKER_RUNTIME_IMAGE}}"
    cmds:
      - docker compose -f {{.COMPOSE_MERGED}} build fixture-server
      - docker compose -f {{.COMPOSE_MERGED}} up -d fixture-server
      - "echo {{.FIXTURE_PROFILES}} > {{.PROFILES_FILE}}"

  planner:
    desc: build and start containerized planner worker (requires LLM key)
    summary: |
      Starts the LLM-backed planner worker. This is kept out of compose:app so
      real-world PARTY collection can run without an LLM key; enable it when
      downstream MEDIA planning is needed.
    deps:
      - task: bake
        vars:
          COMPOSE_PROFILES: '{{.PLANNER_PROFILES}}'
    vars:
      BASE_PROFILES:
        sh: "cat {{.PROFILES_FILE}} 2>/dev/null || echo {{.COMPOSE_PROFILES}}"
      PLANNER_PROFILES:
        sh: 'p="{{.BASE_PROFILES}}"; case ",$p," in *",planner,"*) echo "$p" ;; *) echo "$p,planner" ;; esac'
      PROFILES_SLUG:
        sh: 'echo "{{.PLANNER_PROFILES}}" | tr "," "_"'
      COMPOSE_MERGED: '.{{.ENV}}-{{.PROFILES_SLUG}}.docker-compose.merged.yaml'
    preconditions:
      - sh: "test -f {{.MODE_FILE}}"
        msg: "infra stack is not up. Run 'task compose:up' first."
      - sh: "test -f {{.GEMINI_API_KEY_FILE}}"
        msg: "missing GEMINI_API_KEY_FILE={{.GEMINI_API_KEY_FILE}}"
    env:
      COMPOSE_PROFILES: "{{.PLANNER_PROFILES}}"
      GEMINI_API_KEY:
        sh: "test -f {{.GEMINI_API_KEY_FILE}} && cat {{.GEMINI_API_KEY_FILE}} || true"
      NATS_AUTH_TOKEN:
        sh: "cat {{.NATS_AUTH_TOKEN_FILE}}"
      POSTGRES_APP_PASSWORD:
        sh: "cat {{.POSTGRES_APP_PASSWORD_FILE}}"
      POSTGRES_APP_USER: "{{.POSTGRES_APP_USER}}"
      POSTGRES_APP_DB: "{{.POSTGRES_APP_DB}}"
      WORKER_RUNTIME_IMAGE: "{{.WORKER_RUNTIME_IMAGE}}"
    cmds:
      - docker compose -f {{.COMPOSE_MERGED}} build planner
      - docker compose -f {{.COMPOSE_MERGED}} up -d planner
      - "echo {{.PLANNER_PROFILES}} > {{.PROFILES_FILE}}"

  worker:down:
    desc: stop containerized workers (leaves infra stack running)
    summary: |
      Stops and removes only the worker-profile containers from the active
      project. Core infrastructure and tool/profile services remain running.
    deps:
      - task: bake
        vars:
          COMPOSE_PROFILES: '{{.WORKER_PROFILES}}'
    vars:
      WORKER_PROFILES:
        sh: 'p="{{.EFFECTIVE_PROFILES}}"; case ",$p," in *",worker,"*) echo "$p" ;; *) echo "$p,worker" ;; esac'
      PROFILES_SLUG:
        sh: 'echo "{{.WORKER_PROFILES}}" | tr "," "_"'
      COMPOSE_MERGED: '.{{.ENV}}-{{.PROFILES_SLUG}}.docker-compose.merged.yaml'
    env:
      COMPOSE_PROFILES: "{{.WORKER_PROFILES}}"
    cmds:
      - docker compose -f {{.COMPOSE_MERGED}} stop scheduler-slow scheduler-fast
        discovery collector
      - docker compose -f {{.COMPOSE_MERGED}} rm -f scheduler-slow scheduler-fast
        discovery collector
      - "echo {{.COMPOSE_PROFILES}} > {{.PROFILES_FILE}}"

  worker:logs:
    desc: tail logs from containerized workers
    summary: |
      Follows logs for the containerized worker services in the worker profile.
      This is scoped to scheduler, discovery, and collector containers rather
      than the full infra stack.
    deps:
      - task: bake
        vars:
          COMPOSE_PROFILES: '{{.WORKER_PROFILES}}'
    vars:
      WORKER_PROFILES:
        sh: 'p="{{.EFFECTIVE_PROFILES}}"; case ",$p," in *",worker,"*) echo "$p" ;; *) echo "$p,worker" ;; esac'
      PROFILES_SLUG:
        sh: 'echo "{{.WORKER_PROFILES}}" | tr "," "_"'
      COMPOSE_MERGED: '.{{.ENV}}-{{.PROFILES_SLUG}}.docker-compose.merged.yaml'
    env:
      COMPOSE_PROFILES: "{{.WORKER_PROFILES}}"
    cmds:
      - docker compose -f {{.COMPOSE_MERGED}} logs -f scheduler-slow
        scheduler-fast discovery collector

  tools:down:
    desc: stop profile-gated tool containers (dev/obs) while leaving core infra running
    summary: |
      Stops and removes selected dev/observability tool containers while leaving
      the core infrastructure stack running. Use this to free local resources
      without tearing down Postgres, NATS, Valkey, or SeaweedFS.
    deps: [ bake ]
    vars:
      COMPOSE_MERGED: "{{.EFFECTIVE_COMPOSE_MERGED}}"
    env:
      COMPOSE_PROJECT_NAME: "{{.EFFECTIVE_PROJECT}}"
      COMPOSE_PROFILES: "{{.EFFECTIVE_PROFILES}}"
    cmds:
      - docker compose -f {{.COMPOSE_MERGED}} stop pgadmin nats-nui redisinsight
        victoria-metrics vmagent victoria-logs victoria-traces otel-collector grafana
      - docker compose -f {{.COMPOSE_MERGED}} rm -f pgadmin nats-nui redisinsight
        victoria-metrics vmagent victoria-logs victoria-traces otel-collector grafana
