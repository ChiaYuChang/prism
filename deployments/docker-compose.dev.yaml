services:
  # -------------------------------------------------------------------------
  # Database Management: pgAdmin 4
  # -------------------------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4:9
    container_name: prism-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@prism.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "127.0.0.1:${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - prism-net
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:80",
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  # -------------------------------------------------------------------------
  # NATS UI: Monitoring Dashboard
  # -------------------------------------------------------------------------
  nats-nui:
    image: ghcr.io/nats-nui/nui:0.8.1
    container_name: prism-nats-nui
    ports:
      - "127.0.0.1:${NATS_UI_PORT:-3000}:31311"
    volumes:
      - nui_data:/db
    networks:
      - prism-net
    depends_on:
      nats:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://127.0.0.1:31311",
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
  # -------------------------------------------------------------------------
  # Valkey UI: RedisInsight
  # -------------------------------------------------------------------------
  redisinsight:
    image: redis/redisinsight:3.2
    container_name: prism-redisinsight
    restart: always
    ports:
      - "127.0.0.1:${REDISINSIGHT_PORT:-5540}:5540"
    volumes:
      - redisinsight_data:/data
    networks:
      - prism-net
    depends_on:
      valkey:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:5540/api/health/",
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 15s

volumes:
  pgadmin_data:
  nui_data:
  redisinsight_data:
