# Dev / observability / AI tools, gated by per-service `profiles:`.
# Activate via COMPOSE_PROFILES (comma-separated): e.g.
#   COMPOSE_PROFILES=dev,obs   docker compose ... up
#   COMPOSE_PROFILES=dev,obs,ai docker compose ... up
# `task compose:up` defaults to `dev,obs`. `ai` is opt-in because the
# Ollama image + model pull is heavyweight and only relevant for LLM
# work.

services:
  # ===========================================================================
  # dev profile — local-only admin UIs (pgAdmin, NATS NUI, RedisInsight)
  # ===========================================================================
  pgadmin:
    profiles: [ dev ]
    image: dpage/pgadmin4:9
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@prism.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "127.0.0.1:${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - prism-net
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:80",
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  nats-nui:
    profiles: [ dev ]
    image: ghcr.io/nats-nui/nui:0.8.1
    ports:
      - "127.0.0.1:${NATS_UI_PORT:-3000}:31311"
    volumes:
      - nui_data:/db
    networks:
      - prism-net
    depends_on:
      nats:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://127.0.0.1:31311",
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  redisinsight:
    profiles: [ dev ]
    image: redis/redisinsight:3.2
    restart: always
    ports:
      - "127.0.0.1:${REDISINSIGHT_PORT:-5540}:5540"
    volumes:
      - redisinsight_data:/data
    networks:
      - prism-net
    depends_on:
      valkey:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://127.0.0.1:5540/api/health/",
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 15s

  # ===========================================================================
  # obs profile — JSON log files -> OTel Collector -> VictoriaLogs + Grafana
  # ===========================================================================
  victoria-logs:
    profiles: [ obs ]
    image: victoriametrics/victoria-logs:v1.43.1
    restart: unless-stopped
    ports:
      - "127.0.0.1:${VICTORIA_LOGS_PORT:-9428}:9428"
    volumes:
      - vl-data:/victoria-logs-data
    command:
      - "--retentionPeriod=14d"
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://127.0.0.1:9428/health" ]
      start_period: 20s
    networks:
      - prism-net

  otel-collector:
    profiles: [ obs ]
    image: otel/opentelemetry-collector-contrib:0.141.0
    command: [ "--config=/etc/otelcol-contrib/logs.yaml" ]
    depends_on:
      victoria-logs:
        condition: service_healthy
    volumes:
      - ./otel-collector/logs.yaml:/etc/otelcol-contrib/logs.yaml:ro
      - worker_logs:/logs:ro
    networks:
      - prism-net

  grafana:
    profiles: [ obs ]
    image: grafana/grafana:12.3
    depends_on:
      victoria-logs:
        condition: service_healthy
    ports:
      - "127.0.0.1:${GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_PLUGINS_PREINSTALL=victoriametrics-logs-datasource
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:3000" ]
      start_period: 10s
      interval: 15s
      retries: 5
    networks:
      - prism-net

  # ===========================================================================
  # ai profile — local Ollama for keyword extraction / fallback parsing
  # ===========================================================================
  ollama:
    profiles: [ ai ]
    image: ollama/ollama:0.13.5
    ports:
      - "127.0.0.1:11435:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - prism-net
    healthcheck:
      test: [ "CMD-SHELL", "ollama list > /dev/null || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgadmin_data:
  nui_data:
  redisinsight_data:
  vl-data:
  grafana_data:
  ollama_data:
  worker_logs:
