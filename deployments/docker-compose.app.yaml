# App stack — long-running Prism app/trigger services gated behind the `app`
# profile so infra-only and worker-only starts remain possible. Activate with
# `task compose:app` or `docker compose --profile app up`.

services:
  batch-detector:
    profiles: [ app ]
    image: prism/batch-detector:latest
    user: "0:0"
    build:
      context: ..
      dockerfile: deployments/Dockerfile.worker
      args:
        TARGET: batch/detector
        RUNTIME_IMAGE: ${WORKER_RUNTIME_IMAGE:-gcr.io/distroless/static-debian12:nonroot}
    command:
      - --config=/app/configs/batch/detector/config.yaml
    environment:
      PRISM_BATCH_DETECTOR_POSTGRES_PASSWORD: ${POSTGRES_APP_PASSWORD}
      PRISM_BATCH_DETECTOR_POSTGRES_USERNAME: ${POSTGRES_APP_USER:-prism}
      PRISM_BATCH_DETECTOR_POSTGRES_DB: ${POSTGRES_APP_DB:-prism}
      PRISM_BATCH_DETECTOR_INTERVAL: ${PRISM_BATCH_INTERVAL:-1m}
      PRISM_BATCH_DETECTOR_TELEMETRY_ENABLED: ${PRISM_WORKER_OTEL_ENABLED:-true}
    networks:
      - prism-net
    volumes:
      - worker_logs:/logs
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  batch-publisher:
    profiles: [ app ]
    image: prism/batch-publisher:latest
    user: "0:0"
    build:
      context: ..
      dockerfile: deployments/Dockerfile.worker
      args:
        TARGET: batch/publisher
        RUNTIME_IMAGE: ${WORKER_RUNTIME_IMAGE:-gcr.io/distroless/static-debian12:nonroot}
    command:
      - --config=/app/configs/batch/publisher/config.yaml
    environment:
      PRISM_BATCH_PUBLISHER_NATS_TOKEN: ${NATS_AUTH_TOKEN}
      PRISM_BATCH_PUBLISHER_POSTGRES_PASSWORD: ${POSTGRES_APP_PASSWORD}
      PRISM_BATCH_PUBLISHER_POSTGRES_USERNAME: ${POSTGRES_APP_USER:-prism}
      PRISM_BATCH_PUBLISHER_POSTGRES_DB: ${POSTGRES_APP_DB:-prism}
      PRISM_BATCH_PUBLISHER_INTERVAL: ${PRISM_BATCH_INTERVAL:-1m}
      PRISM_BATCH_PUBLISHER_TELEMETRY_ENABLED: ${PRISM_WORKER_OTEL_ENABLED:-true}
    networks:
      - prism-net
    volumes:
      - worker_logs:/logs
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    restart: unless-stopped

  # api-server — user-facing HTTP API (Phase 2.7). Stage 3 toggles
  # (--cache-enabled, --rate-limit-enabled) are ON here so the live paths are
  # exercised by the Phase 6 e2e driver. Burst is high enough that a 1Hz poll
  # never trips the limiter.
  prism-api:
    profiles: [ app ]
    image: prism/api-server:latest
    user: "0:0"
    build:
      context: ..
      dockerfile: deployments/Dockerfile.worker
      args:
        TARGET: api-server
        RUNTIME_IMAGE: ${WORKER_RUNTIME_IMAGE:-gcr.io/distroless/static-debian12:nonroot}
    command:
      - --config=/app/configs/api-server/config.yaml
    environment:
      PRISM_API_POSTGRES_PASSWORD: ${POSTGRES_APP_PASSWORD}
      PRISM_API_POSTGRES_USERNAME: ${POSTGRES_APP_USER:-prism}
      PRISM_API_POSTGRES_DB: ${POSTGRES_APP_DB:-prism}
      PRISM_API_VALKEY_PASSWORD: ${VALKEY_APP_PASSWORD}
      PRISM_API_VALKEY_USERNAME: ${VALKEY_APP_USER:-prism}
      PRISM_API_TELEMETRY_ENABLED: ${PRISM_WORKER_OTEL_ENABLED:-true}
    ports:
      - "8090:8090"
    networks:
      - prism-net
    volumes:
      - worker_logs:/logs
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    restart: unless-stopped

volumes:
  worker_logs:
