receivers:
  filelog/app:
    include:
      - /logs/*.json
    start_at: end
    include_file_path: true
    operators:
      - type: json_parser
        parse_from: body
        parse_to: attributes

  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

exporters:
  otlphttp/victorialogs:
    logs_endpoint: http://victoria-logs:9428/insert/opentelemetry/v1/logs
    compression: gzip
    encoding: proto

  file/local_backup:
    path: /var/log/app/otel_logs.json
    rotation:
      max_megabytes: 100
      max_backups: 5

  otlphttp/victoriametrics:
    compression: gzip
    encoding: proto
    metrics_endpoint: http://victoria-metrics:8428/opentelemetry/v1/metrics

  otlphttp/victoriatraces:
    compression: gzip
    encoding: proto
    traces_endpoint: http://victoria-traces:10428/insert/opentelemetry/v1/traces

service:
  extensions: [health_check]

  pipelines:
    logs:
      receivers: [filelog/app]
      processors: [batch]
      exporters: [file/local_backup, otlphttp/victorialogs]

    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/victoriametrics]

    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/victoriatraces]
