# Worker stack — long-running Prism worker services gated behind the `worker`
# profile so the daily infra-only `task compose:up` is unaffected. Activate with
# `task compose:worker` (sets COMPOSE_PROFILES=worker) or
# `docker compose --profile worker up`.
#
# Workers join the same `prism-net` network defined in docker-compose.yaml,
# so service-name DNS (`postgres`, `nats`, `valkey`) resolves automatically
# without exposing any of those on the host.
#
# Credentials flow in via env vars resolved at compose time from .env or
# the parent shell. The `compose:worker` task reads them out of `.secrets/`
# before invoking docker compose.

services:
  scheduler-slow:
    profiles: [ worker ]
    image: prism/scheduler:latest
    user: "0:0"
    build:
      context: ..
      dockerfile: deployments/Dockerfile.worker
      args:
        CMD_PATH: cmd/scheduler
        RUNTIME_IMAGE: ${WORKER_RUNTIME_IMAGE:-gcr.io/distroless/static-debian12:nonroot}
    command:
      - --messenger-type=nats
      - --nats-host=nats
      - --nats-port=4222
      - --kinds=DIRECTORY_FETCH,KEYWORD_SEARCH
      - --lock-key=prism:scheduler:DIRECTORY_FETCH+KEYWORD_SEARCH:lock
      - --interval=1m
      - --rate-limit-config=/app/assets/ratelimits/scheduler.yaml
      - --pg-host=postgres
      - --pg-port=5432
      - --pg-username=${POSTGRES_APP_USER:-prism}
      - --pg-db=${POSTGRES_APP_DB:-prism}
      - --valkey-host=valkey
      - --valkey-port=6379
      - --valkey-username=${VALKEY_APP_USER:-prism}
      - --otel-enabled=${PRISM_WORKER_OTEL_ENABLED:-true}
      - --otel-service-name=prism.scheduler.slow
      - --otel-endpoint=otel-collector:4317
      - --log-file-enable
      - --log-file-file=/logs/scheduler-slow.json
    environment:
      PRISM_SCHEDULER_NATS_TOKEN: ${NATS_AUTH_TOKEN}
      PRISM_SCHEDULER_POSTGRES_PASSWORD: ${POSTGRES_APP_PASSWORD}
      PRISM_SCHEDULER_VALKEY_PASSWORD: ${VALKEY_APP_PASSWORD}
    networks:
      - prism-net
    volumes:
      - worker_logs:/logs
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      valkey:
        condition: service_healthy
    restart: unless-stopped

  scheduler-fast:
    profiles: [ worker ]
    image: prism/scheduler:latest
    user: "0:0"
    command:
      - --messenger-type=nats
      - --nats-host=nats
      - --nats-port=4222
      - --kinds=PAGE_FETCH
      - --lock-key=prism:scheduler:PAGE_FETCH:lock
      - --interval=3s
      - --health-port=8091
      - --media-quota=30
      - --buffer=10
      - --rate-limit-config=/app/assets/ratelimits/scheduler.yaml
      - --pg-host=postgres
      - --pg-port=5432
      - --pg-username=${POSTGRES_APP_USER:-prism}
      - --pg-db=${POSTGRES_APP_DB:-prism}
      - --valkey-host=valkey
      - --valkey-port=6379
      - --valkey-username=${VALKEY_APP_USER:-prism}
      - --otel-enabled=${PRISM_WORKER_OTEL_ENABLED:-true}
      - --otel-service-name=prism.scheduler.fast
      - --otel-endpoint=otel-collector:4317
      - --log-file-enable
      - --log-file-file=/logs/scheduler-fast.json
    environment:
      PRISM_SCHEDULER_NATS_TOKEN: ${NATS_AUTH_TOKEN}
      PRISM_SCHEDULER_POSTGRES_PASSWORD: ${POSTGRES_APP_PASSWORD}
      PRISM_SCHEDULER_VALKEY_PASSWORD: ${VALKEY_APP_PASSWORD}
    networks:
      - prism-net
    volumes:
      - worker_logs:/logs
    depends_on:
      scheduler-slow:
        condition: service_started
    restart: unless-stopped

  discovery:
    profiles: [ worker ]
    image: prism/discovery:latest
    user: "0:0"
    build:
      context: ..
      dockerfile: deployments/Dockerfile.worker
      args:
        CMD_PATH: cmd/worker/discovery
        RUNTIME_IMAGE: ${WORKER_RUNTIME_IMAGE:-gcr.io/distroless/static-debian12:nonroot}
    command:
      - --messenger-type=nats
      - --nats-host=nats
      - --nats-port=4222
      - --scout-config=/app/configs/scouts.yaml
      # Same FIXTURE_BASE pattern as collector — empty default = real-site
      # fetch; set to http://fixture-server:9999 for replay (Phase 6).
      - --fixture-base=${FIXTURE_BASE:-}
      - --pg-host=postgres
      - --pg-port=5432
      - --pg-username=${POSTGRES_APP_USER:-prism}
      - --pg-db=${POSTGRES_APP_DB:-prism}
      - --otel-enabled=${PRISM_WORKER_OTEL_ENABLED:-true}
      - --otel-service-name=prism.discovery
      - --otel-endpoint=otel-collector:4317
      - --log-file-enable
      - --log-file-file=/logs/discovery.json
    environment:
      PRISM_DISCOVERY_WORKER_NATS_TOKEN: ${NATS_AUTH_TOKEN}
      PRISM_DISCOVERY_WORKER_POSTGRES_PASSWORD: ${POSTGRES_APP_PASSWORD}
    networks:
      - prism-net
    volumes:
      - worker_logs:/logs
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    restart: unless-stopped

  collector:
    profiles: [ worker ]
    image: prism/collector:latest
    user: "0:0"
    build:
      context: ..
      dockerfile: deployments/Dockerfile.worker
      args:
        CMD_PATH: cmd/worker/collector
        RUNTIME_IMAGE: ${WORKER_RUNTIME_IMAGE:-gcr.io/distroless/static-debian12:nonroot}
    command:
      - --messenger-type=nats
      - --nats-host=nats
      - --nats-port=4222
      - --parsers-config=/app/configs/parsers.yaml
      - --archive=file:///app/archives
      # FIXTURE_BASE is unset for normal real-site operation; the empty
      # value is a passthrough in dev.WrapClientReplay. Set to
      # http://fixture-server:9999 for e2e replay (Phase 6).
      - --fixture-base=${FIXTURE_BASE:-}
      - --pg-host=postgres
      - --pg-port=5432
      - --pg-username=${POSTGRES_APP_USER:-prism}
      - --pg-db=${POSTGRES_APP_DB:-prism}
      - --otel-enabled=${PRISM_WORKER_OTEL_ENABLED:-true}
      - --otel-service-name=prism.collector
      - --otel-endpoint=otel-collector:4317
      - --log-file-enable
      - --log-file-file=/logs/collector.json
    environment:
      PRISM_COLLECTOR_WORKER_NATS_TOKEN: ${NATS_AUTH_TOKEN}
      PRISM_COLLECTOR_WORKER_POSTGRES_PASSWORD: ${POSTGRES_APP_PASSWORD}
    volumes:
      - worker_archives:/app/archives
      - worker_logs:/logs
    networks:
      - prism-net
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    restart: unless-stopped

  planner:
    profiles: [ planner ]
    image: prism/planner:latest
    user: "0:0"
    build:
      context: ..
      dockerfile: deployments/Dockerfile.worker
      args:
        CMD_PATH: cmd/worker/planner
        RUNTIME_IMAGE: ${WORKER_RUNTIME_IMAGE:-gcr.io/distroless/static-debian12:nonroot}
    command:
      - --messenger-type=nats
      - --nats-host=nats
      - --nats-port=4222
      - --pg-host=postgres
      - --pg-port=5432
      - --pg-username=${POSTGRES_APP_USER:-prism}
      - --pg-db=${POSTGRES_APP_DB:-prism}
      - --llm-provider=${PRISM_PLANNER_LLM_PROVIDER:-gemini}
      - --llm-model=${PRISM_PLANNER_LLM_MODEL:-gemini-2.0-flash}
      - --search-target-yahoo-enable=${PRISM_PLANNER_SEARCH_TARGET_YAHOO_ENABLE:-true}
      - --otel-enabled=${PRISM_WORKER_OTEL_ENABLED:-true}
      - --otel-service-name=prism.planner
      - --otel-endpoint=otel-collector:4317
      - --log-file-enable
      - --log-file-file=/logs/planner.json
    environment:
      PRISM_PLANNER_WORKER_NATS_TOKEN: ${NATS_AUTH_TOKEN}
      PRISM_PLANNER_WORKER_POSTGRES_PASSWORD: ${POSTGRES_APP_PASSWORD}
      PRISM_PLANNER_WORKER_LLM_KEY: ${GEMINI_API_KEY:-}
    networks:
      - prism-net
    volumes:
      - worker_logs:/logs
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    restart: unless-stopped

  # fixture-server — serves testdata/fixtures over HTTP for the e2e replay path.
  # It is isolated behind the `fixture` profile and is not part of the normal
  # real-world collection stack.
  fixture-server:
    profiles: [ fixture ]
    image: prism/fixture-server:latest
    build:
      context: ..
      dockerfile: deployments/Dockerfile.worker
      args:
        CMD_PATH: cmd/dev/fixture-server
        RUNTIME_IMAGE: ${WORKER_RUNTIME_IMAGE:-gcr.io/distroless/static-debian12:nonroot}
    command:
      - --addr=:9999
      - --root=/fixtures
    volumes:
      - ../testdata/fixtures:/fixtures:ro
    networks:
      - prism-net
    restart: unless-stopped

volumes:
  worker_archives:
  worker_logs:
