# Worker stack — gated behind the `worker` profile so the daily infra-only
# `task compose:up` is unaffected. Activate with `task compose:worker`
# (sets COMPOSE_PROFILES=worker) or `docker compose --profile worker up`.
#
# Workers join the same `prism-net` network defined in docker-compose.yaml,
# so service-name DNS (`postgres`, `nats`, `valkey`) resolves automatically
# without exposing any of those on the host.
#
# Credentials flow in via env vars resolved at compose time from .env or
# the parent shell. The `compose:worker` task reads them out of `.secrets/`
# before invoking docker compose.

services:
  scheduler-slow:
    profiles: [ worker ]
    image: prism/scheduler:latest
    build:
      context: ..
      dockerfile: deployments/Dockerfile.worker
      args:
        CMD_PATH: cmd/scheduler
        RUNTIME_IMAGE: ${WORKER_RUNTIME_IMAGE:-gcr.io/distroless/static-debian12:nonroot}
    command:
      - --messenger-type=nats
      - --nats-host=nats
      - --nats-port=4222
      - --kinds=DIRECTORY_FETCH,KEYWORD_SEARCH
      - --lock-key=prism:scheduler:DIRECTORY_FETCH+KEYWORD_SEARCH:lock
      - --interval=1m
      - --rate-limit-config=/app/assets/ratelimits/scheduler.yaml
      - --pg-host=postgres
      - --pg-port=5432
      - --pg-username=${POSTGRES_APP_USER:-prism}
      - --pg-db=${POSTGRES_APP_DB:-prism}
      - --valkey-host=valkey
      - --valkey-port=6379
      - --valkey-username=${VALKEY_APP_USER:-prism}
    environment:
      PRISM_SCHEDULER_NATS_TOKEN: ${NATS_AUTH_TOKEN}
      PRISM_SCHEDULER_POSTGRES_PASSWORD: ${POSTGRES_APP_PASSWORD}
      PRISM_SCHEDULER_VALKEY_PASSWORD: ${VALKEY_APP_PASSWORD}
    networks:
      - prism-net
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      valkey:
        condition: service_healthy
    restart: unless-stopped

  scheduler-fast:
    profiles: [ worker ]
    image: prism/scheduler:latest
    command:
      - --messenger-type=nats
      - --nats-host=nats
      - --nats-port=4222
      - --kinds=PAGE_FETCH
      - --lock-key=prism:scheduler:PAGE_FETCH:lock
      - --interval=3s
      - --health-port=8091
      - --media-quota=30
      - --buffer=10
      - --rate-limit-config=/app/assets/ratelimits/scheduler.yaml
      - --pg-host=postgres
      - --pg-port=5432
      - --pg-username=${POSTGRES_APP_USER:-prism}
      - --pg-db=${POSTGRES_APP_DB:-prism}
      - --valkey-host=valkey
      - --valkey-port=6379
      - --valkey-username=${VALKEY_APP_USER:-prism}
    environment:
      PRISM_SCHEDULER_NATS_TOKEN: ${NATS_AUTH_TOKEN}
      PRISM_SCHEDULER_POSTGRES_PASSWORD: ${POSTGRES_APP_PASSWORD}
      PRISM_SCHEDULER_VALKEY_PASSWORD: ${VALKEY_APP_PASSWORD}
    networks:
      - prism-net
    depends_on:
      scheduler-slow:
        condition: service_started
    restart: unless-stopped

  discovery:
    profiles: [ worker ]
    image: prism/discovery:latest
    build:
      context: ..
      dockerfile: deployments/Dockerfile.worker
      args:
        CMD_PATH: cmd/worker/discovery
        RUNTIME_IMAGE: ${WORKER_RUNTIME_IMAGE:-gcr.io/distroless/static-debian12:nonroot}
    command:
      - --messenger-type=nats
      - --nats-host=nats
      - --nats-port=4222
      - --scout-config=/app/configs/scouts.yaml
      # Same FIXTURE_BASE pattern as collector — empty default = real-site
      # fetch; set to http://fixture-server:9999 for replay (Phase 6).
      - --fixture-base=${FIXTURE_BASE:-}
      - --pg-host=postgres
      - --pg-port=5432
      - --pg-username=${POSTGRES_APP_USER:-prism}
      - --pg-db=${POSTGRES_APP_DB:-prism}
    environment:
      PRISM_DISCOVERY_WORKER_NATS_TOKEN: ${NATS_AUTH_TOKEN}
      PRISM_DISCOVERY_WORKER_POSTGRES_PASSWORD: ${POSTGRES_APP_PASSWORD}
    networks:
      - prism-net
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    restart: unless-stopped

  collector:
    profiles: [ worker ]
    image: prism/collector:latest
    build:
      context: ..
      dockerfile: deployments/Dockerfile.worker
      args:
        CMD_PATH: cmd/worker/collector
        RUNTIME_IMAGE: ${WORKER_RUNTIME_IMAGE:-gcr.io/distroless/static-debian12:nonroot}
    command:
      - --messenger-type=nats
      - --nats-host=nats
      - --nats-port=4222
      - --parsers-config=/app/configs/parsers.yaml
      - --archive=file:///app/archives
      # FIXTURE_BASE is unset for normal real-site operation; the empty
      # value is a passthrough in dev.WrapClientReplay. Set to
      # http://fixture-server:9999 for e2e replay (Phase 6).
      - --fixture-base=${FIXTURE_BASE:-}
      - --pg-host=postgres
      - --pg-port=5432
      - --pg-username=${POSTGRES_APP_USER:-prism}
      - --pg-db=${POSTGRES_APP_DB:-prism}
    environment:
      PRISM_COLLECTOR_WORKER_NATS_TOKEN: ${NATS_AUTH_TOKEN}
      PRISM_COLLECTOR_WORKER_POSTGRES_PASSWORD: ${POSTGRES_APP_PASSWORD}
    volumes:
      - worker_archives:/app/archives
    networks:
      - prism-net
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      fixture-server:
        condition: service_started
    restart: unless-stopped

  # api-server — user-facing HTTP API (Phase 2.7). Stage 3 toggles
  # (--cache-enabled, --rate-limit-enabled) are ON here so the live
  # paths are exercised by the Phase 6 e2e driver. Burst is high enough
  # that a 1Hz poll never trips the limiter.
  prism-api:
    profiles: [ worker ]
    image: prism/api-server:latest
    build:
      context: ..
      dockerfile: deployments/Dockerfile.worker
      args:
        CMD_PATH: cmd/api-server
        RUNTIME_IMAGE: ${WORKER_RUNTIME_IMAGE:-gcr.io/distroless/static-debian12:nonroot}
    command:
      - --port=8090
      - --pg-host=postgres
      - --pg-port=5432
      - --pg-username=${POSTGRES_APP_USER:-prism}
      - --pg-db=${POSTGRES_APP_DB:-prism}
      - --valkey-host=valkey
      - --valkey-port=6379
      - --valkey-username=${VALKEY_APP_USER:-prism}
      - --cache-enabled
      - --rate-limit-enabled
      - --rate-limit-rps=100
      - --rate-limit-burst=200
    environment:
      PRISM_API_POSTGRES_PASSWORD: ${POSTGRES_APP_PASSWORD}
      PRISM_API_VALKEY_PASSWORD: ${VALKEY_APP_PASSWORD}
    ports:
      - "8090:8090"
    networks:
      - prism-net
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    restart: unless-stopped

  # fixture-server — serves testdata/fixtures over HTTP for the e2e
  # replay path. Idle in normal worker mode (no traffic until collector
  # is launched with FIXTURE_BASE=http://fixture-server:9999).
  fixture-server:
    profiles: [ worker ]
    image: prism/fixture-server:latest
    build:
      context: ..
      dockerfile: deployments/Dockerfile.worker
      args:
        CMD_PATH: cmd/dev/fixture-server
        RUNTIME_IMAGE: ${WORKER_RUNTIME_IMAGE:-gcr.io/distroless/static-debian12:nonroot}
    command:
      - --addr=:9999
      - --root=/fixtures
    volumes:
      - ../testdata/fixtures:/fixtures:ro
    networks:
      - prism-net
    restart: unless-stopped

volumes:
  worker_archives:
