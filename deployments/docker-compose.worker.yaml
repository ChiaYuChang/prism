# Worker stack — long-running Prism worker services gated behind the `worker`
# profile so the daily infra-only `task compose:up` is unaffected. Activate with
# `task compose:worker` (sets COMPOSE_PROFILES=worker) or
# `docker compose --profile worker up`.
#
# Workers join the same `prism-net` network defined in docker-compose.yaml,
# so service-name DNS (`postgres`, `nats`, `valkey`) resolves automatically
# without exposing any of those on the host.
#
# Credentials flow in via env vars resolved at compose time from .env or
# the parent shell. The `compose:worker` task reads them out of `.secrets/`
# before invoking docker compose.

services:
  scheduler-slow:
    profiles: [ worker ]
    image: prism/scheduler:latest
    user: "0:0"
    build:
      context: ..
      dockerfile: deployments/Dockerfile.worker
      args:
        TARGET: scheduler
        RUNTIME_IMAGE: ${WORKER_RUNTIME_IMAGE:-gcr.io/distroless/static-debian12:nonroot}
    command:
      - --config=/app/configs/scheduler/slow.yaml
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_APP_USER: ${POSTGRES_APP_USER:-prism}
      POSTGRES_APP_DB: ${POSTGRES_APP_DB:-prism}
      VALKEY_HOST: valkey
      VALKEY_PORT: 6379
      VALKEY_APP_USER: ${VALKEY_APP_USER:-prism}
      OTEL_COLLECTOR_ENDPOINT: otel-collector:4317
      PRISM_WORKER_OTEL_ENABLED: ${PRISM_WORKER_OTEL_ENABLED:-true}
      PRISM_SCHEDULER_NATS_TOKEN: ${NATS_AUTH_TOKEN}
      PRISM_SCHEDULER_POSTGRES_PASSWORD: ${POSTGRES_APP_PASSWORD}
      PRISM_SCHEDULER_POSTGRES_USERNAME: ${POSTGRES_APP_USER:-prism}
      PRISM_SCHEDULER_POSTGRES_DB: ${POSTGRES_APP_DB:-prism}
      PRISM_SCHEDULER_VALKEY_PASSWORD: ${VALKEY_APP_PASSWORD}
      PRISM_SCHEDULER_VALKEY_USERNAME: ${VALKEY_APP_USER:-prism}
      PRISM_SCHEDULER_TELEMETRY_ENABLED: ${PRISM_WORKER_OTEL_ENABLED:-true}
    networks:
      - prism-net
    volumes:
      - ../runtime/logs/scheduler-slow:/logs
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      valkey:
        condition: service_healthy
    restart: unless-stopped

  scheduler-fast:
    profiles: [ worker ]
    image: prism/scheduler:latest
    user: "0:0"
    command:
      - --config=/app/configs/scheduler/fast.yaml
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_APP_USER: ${POSTGRES_APP_USER:-prism}
      POSTGRES_APP_DB: ${POSTGRES_APP_DB:-prism}
      VALKEY_HOST: valkey
      VALKEY_PORT: 6379
      VALKEY_APP_USER: ${VALKEY_APP_USER:-prism}
      OTEL_COLLECTOR_ENDPOINT: otel-collector:4317
      PRISM_WORKER_OTEL_ENABLED: ${PRISM_WORKER_OTEL_ENABLED:-true}
      PRISM_SCHEDULER_NATS_TOKEN: ${NATS_AUTH_TOKEN}
      PRISM_SCHEDULER_POSTGRES_PASSWORD: ${POSTGRES_APP_PASSWORD}
      PRISM_SCHEDULER_POSTGRES_USERNAME: ${POSTGRES_APP_USER:-prism}
      PRISM_SCHEDULER_POSTGRES_DB: ${POSTGRES_APP_DB:-prism}
      PRISM_SCHEDULER_VALKEY_PASSWORD: ${VALKEY_APP_PASSWORD}
      PRISM_SCHEDULER_VALKEY_USERNAME: ${VALKEY_APP_USER:-prism}
      PRISM_SCHEDULER_TELEMETRY_ENABLED: ${PRISM_WORKER_OTEL_ENABLED:-true}
    networks:
      - prism-net
    volumes:
      - ../runtime/logs/scheduler-fast:/logs
    depends_on:
      scheduler-slow:
        condition: service_started
    restart: unless-stopped

  discovery:
    profiles: [ worker ]
    image: prism/discovery:latest
    user: "0:0"
    build:
      context: ..
      dockerfile: deployments/Dockerfile.worker
      args:
        TARGET: worker/discovery
        RUNTIME_IMAGE: ${WORKER_RUNTIME_IMAGE:-gcr.io/distroless/static-debian12:nonroot}
    command:
      - --config=/app/configs/worker/discovery/config.yaml
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_APP_USER: ${POSTGRES_APP_USER:-prism}
      POSTGRES_APP_DB: ${POSTGRES_APP_DB:-prism}
      OTEL_COLLECTOR_ENDPOINT: otel-collector:4317
      PRISM_WORKER_OTEL_ENABLED: ${PRISM_WORKER_OTEL_ENABLED:-true}
      FIXTURE_BASE: ${FIXTURE_BASE:-}
      PRISM_DISCOVERY_WORKER_NATS_TOKEN: ${NATS_AUTH_TOKEN}
      PRISM_DISCOVERY_WORKER_POSTGRES_PASSWORD: ${POSTGRES_APP_PASSWORD}
      PRISM_DISCOVERY_WORKER_POSTGRES_USERNAME: ${POSTGRES_APP_USER:-prism}
      PRISM_DISCOVERY_WORKER_POSTGRES_DB: ${POSTGRES_APP_DB:-prism}
      PRISM_DISCOVERY_WORKER_FIXTURE_BASE: ${FIXTURE_BASE:-}
      PRISM_DISCOVERY_WORKER_TELEMETRY_ENABLED: ${PRISM_WORKER_OTEL_ENABLED:-true}
    networks:
      - prism-net
    volumes:
      - ../runtime/logs/discovery:/logs
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    restart: unless-stopped

  collector:
    profiles: [ worker ]
    image: prism/collector:latest
    user: "0:0"
    build:
      context: ..
      dockerfile: deployments/Dockerfile.worker
      args:
        TARGET: worker/collector
        RUNTIME_IMAGE: ${WORKER_RUNTIME_IMAGE:-gcr.io/distroless/static-debian12:nonroot}
    command:
      - --config=/app/configs/worker/collector/config.yaml
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_APP_USER: ${POSTGRES_APP_USER:-prism}
      POSTGRES_APP_DB: ${POSTGRES_APP_DB:-prism}
      OTEL_COLLECTOR_ENDPOINT: otel-collector:4317
      PRISM_WORKER_OTEL_ENABLED: ${PRISM_WORKER_OTEL_ENABLED:-true}
      FIXTURE_BASE: ${FIXTURE_BASE:-}
      PRISM_COLLECTOR_WORKER_NATS_TOKEN: ${NATS_AUTH_TOKEN}
      PRISM_COLLECTOR_WORKER_POSTGRES_PASSWORD: ${POSTGRES_APP_PASSWORD}
      PRISM_COLLECTOR_WORKER_POSTGRES_USERNAME: ${POSTGRES_APP_USER:-prism}
      PRISM_COLLECTOR_WORKER_POSTGRES_DB: ${POSTGRES_APP_DB:-prism}
      PRISM_COLLECTOR_WORKER_FIXTURE_BASE: ${FIXTURE_BASE:-}
      PRISM_COLLECTOR_WORKER_TELEMETRY_ENABLED: ${PRISM_WORKER_OTEL_ENABLED:-true}
    volumes:
      - worker_archives:/app/archives
      - ../runtime/logs/collector:/logs
    networks:
      - prism-net
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    restart: unless-stopped

  planner:
    profiles: [ planner ]
    image: prism/planner:latest
    user: "0:0"
    build:
      context: ..
      dockerfile: deployments/Dockerfile.worker
      args:
        TARGET: worker/planner
        RUNTIME_IMAGE: ${WORKER_RUNTIME_IMAGE:-gcr.io/distroless/static-debian12:nonroot}
    command:
      - --config=/app/configs/worker/planner/config.yaml
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_APP_USER: ${POSTGRES_APP_USER:-prism}
      POSTGRES_APP_DB: ${POSTGRES_APP_DB:-prism}
      OTEL_COLLECTOR_ENDPOINT: otel-collector:4317
      PRISM_WORKER_OTEL_ENABLED: ${PRISM_WORKER_OTEL_ENABLED:-true}
      PRISM_PLANNER_LLM_PROVIDER: ${PRISM_PLANNER_LLM_PROVIDER:-gemini}
      PRISM_PLANNER_LLM_MODEL: ${PRISM_PLANNER_LLM_MODEL:-gemini-2.0-flash}
      PRISM_PLANNER_SEARCH_TARGET_YAHOO_ENABLE: ${PRISM_PLANNER_SEARCH_TARGET_YAHOO_ENABLE:-true}
      PRISM_PLANNER_WORKER_NATS_TOKEN: ${NATS_AUTH_TOKEN}
      PRISM_PLANNER_WORKER_POSTGRES_PASSWORD: ${POSTGRES_APP_PASSWORD}
      PRISM_PLANNER_WORKER_POSTGRES_USERNAME: ${POSTGRES_APP_USER:-prism}
      PRISM_PLANNER_WORKER_POSTGRES_DB: ${POSTGRES_APP_DB:-prism}
      PRISM_PLANNER_WORKER_LLM_KEY: ${GEMINI_API_KEY:-}
      PRISM_PLANNER_WORKER_LLM_PROVIDER: ${PRISM_PLANNER_LLM_PROVIDER:-gemini}
      PRISM_PLANNER_WORKER_LLM_MODEL: ${PRISM_PLANNER_LLM_MODEL:-gemini-2.0-flash}
      PRISM_PLANNER_WORKER_SEARCH_TARGETS_YAHOO_ENABLE: ${PRISM_PLANNER_SEARCH_TARGET_YAHOO_ENABLE:-true}
      PRISM_PLANNER_WORKER_TELEMETRY_ENABLED: ${PRISM_WORKER_OTEL_ENABLED:-true}
    networks:
      - prism-net
    volumes:
      - ../runtime/logs/planner:/logs
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    restart: unless-stopped

  # fixture-server — serves testdata/real over HTTP for the e2e replay path.
  # It is isolated behind the `fixture` profile and is not part of the normal
  # real-world collection stack.
  fixture-server:
    profiles: [ fixture ]
    image: prism/fixture-server:latest
    build:
      context: ..
      dockerfile: deployments/Dockerfile.worker
      args:
        TARGET: dev/fixture-server
        RUNTIME_IMAGE: ${WORKER_RUNTIME_IMAGE:-gcr.io/distroless/static-debian12:nonroot}
    command:
      - --addr=:9999
      - --root=/fixtures
    volumes:
      - ../testdata/real:/fixtures:ro
    networks:
      - prism-net
    restart: unless-stopped

volumes:
  worker_archives:
