global:
  scrape_interval: 15s
  scrape_timeout: 5s

scrape_configs:
  - job_name: prism-pgx
    metrics_path: /metrics
    static_configs:
      - targets:
          - batch-detector:8083
        labels:
          service: prism.batch.detector
      - targets:
          - batch-publisher:8084
        labels:
          service: prism.batch.publisher
      - targets:
          - prism-api:8089
        labels:
          service: prism.api
      - targets:
          - scheduler-slow:8090
        labels:
          service: prism.scheduler.slow
      - targets:
          - scheduler-fast:8091
        labels:
          service: prism.scheduler.fast
      - targets:
          - discovery:8092
        labels:
          service: prism.discovery
      - targets:
          - collector:8093
        labels:
          service: prism.collector
      - targets:
          - planner:8094
        labels:
          service: prism.planner
