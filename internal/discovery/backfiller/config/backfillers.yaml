version: 1
backfiller:
  sources:
    dpp:
      source_id: 1
      format: html
      base_url: https://www.dpp.org.tw
      pager:
        type: "index"
        mode: "index"
        url_template: "{{.BaseURL}}/media/{{printf \"%02d\" .Value}}"
        first: 0
        step: 10

    tpp:
      source_id: 2
      format: html
      base_url: https://www.tpp.org.tw
      pager:
        type: "index"
        mode: "index"
        url_template: "{{.BaseURL}}/media"
        first: 1
        step: 1
        params:
          page: "{{.Value}}"

    kmt:
      source_id: 3
      format: atom
      base_url: https://www.kmt.org.tw
      pager:
        type: "index"
        mode: "index"
        url_template: "{{.BaseURL}}/feeds/posts/summary/-/新聞稿"
        first: 1
        step: 10
        params:
          start-index: "{{.Value}}"
          max-results: "10"
