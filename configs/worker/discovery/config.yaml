health-port: 8092
http-timeout: 30s
scout-config: /app/configs/worker/discovery/scouts.yaml
fixture-base: ""
messenger-type: nats
nats-host: nats
nats-port: 4222
queue-group: discovery-worker
subscribers-count: 1
ack-wait-timeout: 30s
postgres:
  host: postgres
  port: 5432
  username: prism
  db: prism
  sslmode: disable
telemetry:
  enabled: true
  service-name: prism.discovery
  environment: local
  endpoint: otel-collector:4317
  insecure: true
  sample-ratio: 1
  timeout: 10s
logger:
  level: info
  console:
    enable: true
  file:
    enable: true
    file: /logs/discovery.json
  otel:
    url: otel-collector:4317
    insecure: true
    timeout: 10s
