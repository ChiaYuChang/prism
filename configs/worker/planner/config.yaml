health-port: 8094
prompt-path: /app/assets/worker/planner/prompts/analysis/extractor.md
messenger-type: nats
nats-host: nats
nats-port: 4222
queue-group: planner-worker
subscribers-count: 1
ack-wait-timeout: 30s
postgres:
  host: '{{ env "POSTGRES_HOST" "postgres" }}'
  port: {{ env "POSTGRES_PORT" "5432" }}
  username: '{{ env "POSTGRES_APP_USER" "prism" }}'
  db: '{{ env "POSTGRES_APP_DB" "prism" }}'
  sslmode: disable
llm:
  provider: '{{ env "PRISM_PLANNER_LLM_PROVIDER" "gemini" }}'
  model: '{{ env "PRISM_PLANNER_LLM_MODEL" "gemini-2.0-flash" }}'
  timeout: 30s
search:
  targets:
    yahoo:
      enable: {{ env "PRISM_PLANNER_SEARCH_TARGET_YAHOO_ENABLE" "true" }}
      source_abbr: yahoo
      url: https://tw.news.yahoo.com
      site: tw.news.yahoo.com
telemetry:
  enabled: {{ env "PRISM_WORKER_OTEL_ENABLED" "true" }}
  service-name: prism.planner
  environment: local
  endpoint: '{{ env "OTEL_COLLECTOR_ENDPOINT" "otel-collector:4317" }}'
  insecure: true
  sample-ratio: 1
  timeout: 10s
logger:
  level: info
  console:
    enable: true
  file:
    enable: true
    file: /logs/planner.json
  otel:
    url: '{{ env "OTEL_COLLECTOR_ENDPOINT" "otel-collector:4317" }}'
    insecure: true
    timeout: 10s
