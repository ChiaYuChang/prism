health-port: 8093
http-timeout: 30s
max-processing-time: 2m
archive: file:///app/archives
parsers-config: /app/configs/worker/collector/parsers.yaml
fixture-base: '{{ env "FIXTURE_BASE" "" }}'
force-minify-error: false
messenger-type: nats
nats-host: nats
nats-port: 4222
queue-group: collector-worker
subscribers-count: 1
ack-wait-timeout: 30s
postgres:
  host: '{{ env "POSTGRES_HOST" "postgres" }}'
  port: {{ env "POSTGRES_PORT" "5432" }}
  username: '{{ env "POSTGRES_APP_USER" "prism" }}'
  db: '{{ env "POSTGRES_APP_DB" "prism" }}'
  sslmode: disable
telemetry:
  enabled: {{ env "PRISM_WORKER_OTEL_ENABLED" "true" }}
  service-name: prism.collector
  environment: local
  endpoint: '{{ env "OTEL_COLLECTOR_ENDPOINT" "otel-collector:4317" }}'
  insecure: true
  sample-ratio: 1
  timeout: 10s
logger:
  level: info
  console:
    enable: true
  file:
    enable: true
    file: /logs/app.log
    max-size: 10MiB
    max-files: 5
  otel:
    url: '{{ env "OTEL_COLLECTOR_ENDPOINT" "otel-collector:4317" }}'
    insecure: true
    timeout: 10s
