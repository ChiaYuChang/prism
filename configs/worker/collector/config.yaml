health-port: 8093
http-timeout: 30s
max-processing-time: 2m
archive: file:///app/archives
parsers-config: /app/configs/worker/collector/parsers.yaml
fixture-base: ""
force-minify-error: false
messenger-type: nats
nats-host: nats
nats-port: 4222
queue-group: collector-worker
subscribers-count: 1
ack-wait-timeout: 30s
postgres:
  host: postgres
  port: 5432
  username: prism
  db: prism
  sslmode: disable
telemetry:
  enabled: true
  service-name: prism.collector
  environment: local
  endpoint: otel-collector:4317
  insecure: true
  sample-ratio: 1
  timeout: 10s
logger:
  level: info
  console:
    enable: true
  file:
    enable: true
    file: /logs/collector.json
  otel:
    url: otel-collector:4317
    insecure: true
    timeout: 10s
