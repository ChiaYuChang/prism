version: 1

# Global LLM fallback. Default disabled - uncomment to opt in. When
# enabled, hosts without a `parsers:` entry route to an LLM-backed
# parser using the shared response schema (ParserConfigJSONSchema).
# Provider/model/key sit here so the activation surface is one file.
# Set `key_file` to a mounted secret path; `key` inline is supported
# but discouraged for production. `prompt_file` is required when
# `enable: true`. See docs/plan/spec.md section 6 LLM dual-role entry.
#
# fallback:
#   enable: true
#   prompt_file: /app/assets/worker/collector/prompts/collector/article_parser.md
#   llm:
#     provider: gemini       # gemini | openai | ollama
#     model: gemini-2.0-flash
#     key_file: /run/secrets/llm_key
#     timeout: 30s

# Parsers mapping. Keyed by hostname. Format is implicitly selected by the
# configuration block present (e.g., `html:`). Currently only `html` is supported.
parsers:
  www.dpp.org.tw:
    enabled: true
    jsonld: false
    date_layouts:
      - "2006-01-02"
    html:
      title:
        - "article.news_content h2"
      date:
        - "p.news_content_date"
      content:
        - "#media_contents p"

  www.tpp.org.tw:
    enabled: true
    jsonld: false
    date_layouts:
      - "2006/01/02"
    html:
      title:
        - "div.content_topic"
      date:
        - "span.content_date"
      content:
        - "div.content_description"

  www.kmt.org.tw:
    enabled: true
    jsonld: false
    date_layouts:
      - "2006-01-02T15:04:05-07:00"
    html:
      title:
        - "#div1 h3"
      date:
        - "#div1 div.post-footer-line i.pdt abbr.published@title"
      content:
        - "#div1 div.post-body p"

  tw.news.yahoo.com:
    enabled: true
    jsonld: true # Yahoo has excellent JSON-LD
    html:
      content:
        - ".caas-body"
