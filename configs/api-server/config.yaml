port: 8090
read-timeout: 10s
write-timeout: 30s
shutdown-timeout: 10s
cors-origins: []
postgres:
  host: '{{ env "POSTGRES_HOST" "postgres" }}'
  port: {{ env "POSTGRES_PORT" "5432" }}
  username: '{{ env "POSTGRES_APP_USER" "prism" }}'
  db: '{{ env "POSTGRES_APP_DB" "prism" }}'
  sslmode: disable
valkey:
  host: '{{ env "VALKEY_HOST" "valkey" }}'
  port: {{ env "VALKEY_PORT" "6379" }}
  username: '{{ env "VALKEY_APP_USER" "prism" }}'
  db: 0
cache:
  enabled: {{ env "PRISM_WORKER_OTEL_ENABLED" "true" }}
  live-ttl: 2s
  terminal-ttl: 60s
rate-limit:
  enabled: true
  rps: 100
  burst: 200
  ip-cache-size: 4096
auth:
  token:
    tokens: []
    file: ""
telemetry:
  enabled: true
  service-name: prism.api
  environment: local
  endpoint: '{{ env "OTEL_COLLECTOR_ENDPOINT" "otel-collector:4317" }}'
  insecure: true
  sample-ratio: 1
  timeout: 10s
logger:
  level: info
  console:
    enable: true
  file:
    enable: true
    file: /logs/app.log
    max-size: 10MiB
    max-files: 5
  otel:
    url: '{{ env "OTEL_COLLECTOR_ENDPOINT" "otel-collector:4317" }}'
    insecure: true
    timeout: 10s

monitoring:
  backend: valkey
  mode: pull
  interval: 10s
  timeout: 2s
  status-key: api:status
  internal-port: 8089
  targets:
    batch-detector:
      enabled: true
      url: http://batch-detector:8083/health
      display-name: Batch Detector
      description: Detects completed batches of party press releases
      group: batch
    batch-publisher:
      enabled: true
      url: http://batch-publisher:8084/health
      display-name: Batch Publisher
      description: Publishes batch completed events
      group: batch
    scheduler-slow:
      enabled: true
      url: http://scheduler-slow:8090/health
      display-name: Scheduler (Slow)
      description: Schedules and dispatches low-priority tasks
      group: scheduler
    scheduler-fast:
      enabled: true
      url: http://scheduler-fast:8091/health
      display-name: Scheduler (Fast)
      description: Schedules and dispatches high-priority tasks
      group: scheduler
    discovery:
      enabled: true
      url: http://discovery:8092/health
      display-name: Discovery Worker
      description: Crawls and discovers candidate briefs
      group: worker
    collector:
      enabled: true
      url: http://collector:8093/health
      display-name: Collector Worker
      description: Fetches and parses full press releases
      group: worker
    planner:
      enabled: true
      url: http://planner:8094/health
      display-name: Planner Worker
      description: Plans and schedules media tasks
      group: worker
