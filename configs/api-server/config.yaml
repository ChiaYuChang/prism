port: 8090
read-timeout: 10s
write-timeout: 30s
shutdown-timeout: 10s
cors-origins: []
postgres:
  host: '{{ env "POSTGRES_HOST" "postgres" }}'
  port: {{ env "POSTGRES_PORT" "5432" }}
  username: '{{ env "POSTGRES_APP_USER" "prism" }}'
  db: '{{ env "POSTGRES_APP_DB" "prism" }}'
  sslmode: disable
valkey:
  host: '{{ env "VALKEY_HOST" "valkey" }}'
  port: {{ env "VALKEY_PORT" "6379" }}
  username: '{{ env "VALKEY_APP_USER" "prism" }}'
  db: 0
cache:
  enabled: {{ env "PRISM_WORKER_OTEL_ENABLED" "true" }}
  live-ttl: 2s
  terminal-ttl: 60s
rate-limit:
  enabled: true
  rps: 100
  burst: 200
  ip-cache-size: 4096
auth:
  token:
    tokens: []
    file: ""
telemetry:
  enabled: true
  service-name: prism.api
  environment: local
  endpoint: '{{ env "OTEL_COLLECTOR_ENDPOINT" "otel-collector:4317" }}'
  insecure: true
  sample-ratio: 1
  timeout: 10s
logger:
  level: info
  console:
    enable: true
  file:
    enable: true
    file: /logs/api-server.json
  otel:
    url: '{{ env "OTEL_COLLECTOR_ENDPOINT" "otel-collector:4317" }}'
    insecure: true
    timeout: 10s
