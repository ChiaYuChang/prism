port: 8090
read-timeout: 10s
write-timeout: 30s
shutdown-timeout: 10s
cors-origins: []
postgres:
  host: postgres
  port: 5432
  username: prism
  db: prism
  sslmode: disable
valkey:
  host: valkey
  port: 6379
  username: prism
  db: 0
cache:
  enabled: true
  live-ttl: 2s
  terminal-ttl: 60s
rate-limit:
  enabled: true
  rps: 100
  burst: 200
  ip-cache-size: 4096
auth:
  token:
    tokens: []
    file: ""
telemetry:
  enabled: true
  service-name: prism.api
  environment: local
  endpoint: otel-collector:4317
  insecure: true
  sample-ratio: 1
  timeout: 10s
logger:
  level: info
  console:
    enable: true
  file:
    enable: true
    file: /logs/api-server.json
  otel:
    url: otel-collector:4317
    insecure: true
    timeout: 10s
