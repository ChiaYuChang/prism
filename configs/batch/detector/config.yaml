interval: 1m
once: false
recent-limit: 100
health-port: 8083
postgres:
  host: postgres
  port: 5432
  username: prism
  db: prism
  sslmode: disable
telemetry:
  enabled: true
  service-name: prism.batch.detector
  environment: local
  endpoint: otel-collector:4317
  insecure: true
  sample-ratio: 1
  timeout: 10s
logger:
  level: info
  console:
    enable: true
  file:
    enable: true
    file: /logs/batch-detector.json
  otel:
    url: otel-collector:4317
    insecure: true
    timeout: 10s
