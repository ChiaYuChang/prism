name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Short Go Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run short tests
        run: go test -v -short -cover ./...
